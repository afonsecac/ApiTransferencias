monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                level: error
                path: '%kernel.logs_dir%/debug.%kernel.environment%.log'
                max_files: 10
            # uncomment to get logging in your browser
            # you may have to allow bigger header sizes in your Web server configuration
            #firephp:
            #    type: firephp
            #    level: info
            #chromephp:
            #    type: chromephp
            #    level: info
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
            streamed:
                type: stream
                path: '%kernel.logs_dir%/debug.%kernel.environment%.log'
                level: debug


when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                excluded_http_codes: [404, 405]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
                handler: grouped
            security:
                type: stream
                path: "%kernel.logs_dir%/security.%kernel.environment%.log"
                level: debug
                channels: [ "security" ]
                max_files: 10
            file_log:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                max_files: 10
                level: info
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
            grouped:
                type: group
                members: [ streamed, deduplicated ]
            streamed:
                type: stream
                path: '%kernel.logs_dir%/debug.%kernel.environment%.log'
                level: debug
                max_files: 10
            deduplicated:
                type: deduplication
                handler: symfony_mailer
            symfony_mailer:
                type: symfony_mailer
                from_email: 'support@sendmundo.com'
                to_email: ['alexander.afonsecac@gmail.com', 'aportela7@gmail.com']
                subject: 'An Error Occurred in Api Clients! %%message%%'
                level: debug
                formatter: monolog.formatter.html
                content_type: text/html

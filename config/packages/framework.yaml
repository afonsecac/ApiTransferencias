# see https://symfony.com/doc/current/reference/configuration/framework.html
parameters:
    # Valor por defecto de TRUSTED_PROXIES cuando la variable de entorno no está
    # definida. 'private_ranges' confía en los rangos IP privados (red Docker /
    # Traefik), que es donde vive el reverse proxy en despliegue.
    env(TRUSTED_PROXIES): 'private_ranges'

framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    # Necesario para que $request->getClientIp() devuelva la IP real del cliente
    # (y no la del reverse proxy) y para que X-Forwarded-For solo se acepte cuando
    # proviene de un proxy de confianza. Sin esto, la cabecera es falsificable y
    # permite eludir la allowlist de IP en ApiTokenAuthenticator.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    rate_limiter:
        dashboard_login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        dashboard_login_ip:
            policy: 'sliding_window'
            limit: 20
            interval: '5 minutes'
        # Intentos de código 2FA (verificación, enrolamiento y confirmación desde el perfil).
        # El intervalo va alineado con la vida del pendingToken: sin esto, un código de 6
        # dígitos es forzable por fuerza bruta durante los 10 minutos que dura el token.
        two_factor_code:
            policy: 'sliding_window'
            limit: 10
            interval: '10 minutes'
        forgot_password:
            policy: 'fixed_window'
            limit: 3
            interval: '15 minutes'
        reset_password:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        api_transfer:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        api_recharge:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        activate_account:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        resend_activation:
            policy: 'fixed_window'
            limit: 3
            interval: '15 minutes'
#    serializer:
#        enable_annotations: true

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
        save_path: '/tmp'

    #esi: true
    #fragments: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

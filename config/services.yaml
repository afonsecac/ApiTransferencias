# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.secret: '%env(APP_SECRET)%'
    app.email.support: '%env(MAILER_DSN)%'
    app.microsoft.url: '%env(MICROSOFT_URL)%'
    app.phoneNumber: '%env(APP_TEST_PHONE)%'
    app.email.from: '%env(APP_MAILER_FROM)%'
    app.jwt.expired: '%env(JWT_TIMEOUT)%'
    app.jwt.issuer: '%env(default:jwt_iss_default:JWT_ISSUER)%'
    app.jwt.audience: '%env(default:jwt_aud_default:JWT_AUDIENCE)%'
    jwt_iss_default: 'https://api-tx.sendmundo.com'
    jwt_aud_default: 'https://dashboard.sendmundo.com'
    phrase_key: '%env(JWT_PHRASE_KEY)%'


services:
#    App\State\CreateBeneficiaryCardProcessor:
#         bind:
#             $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'
    'App\Doctrine\CurrentUserExtension':
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }
            - { name: 'api_platform.doctrine.orm.query_extension.item' }
    'App\Doctrine\PromotionDateScopeExtension':
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@dev:
    services:
        App\OpenApi\OpenApiFactory:
            decorates: 'api_platform.openapi.factory'
            arguments:
                $decorated: '@App\OpenApi\OpenApiFactory.inner'
                $builder: '@App\OpenApi\DashboardOpenApiBuilder'

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transferencias
  namespace: api-transferencias
  labels:
    app: api-transferencias
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-transferencias
      component: api
  template:
    metadata:
      labels:
        app: api-transferencias
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-transferencias
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: copy-public
          image: api-transferencias:latest
          command: ["sh", "-c", "cp -r /var/www/public/. /shared-public/"]
          volumeMounts:
            - name: shared-public
              mountPath: /shared-public
      containers:
        - name: php-fpm
          image: api-transferencias:latest
          ports:
            - containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-transferencias-config
            - secretRef:
                name: api-transferencias-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: 80
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: shared-public
              mountPath: /var/www/public
              readOnly: true

        - name: nginx
          image: api-transferencias-nginx:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: shared-public
              mountPath: /var/www/public
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

      volumes:
        - name: shared-public
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: api-transferencias
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /var/www/public;

        location / {
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            internal;
        }

        location ~ \.php$ {
            return 404;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-balance
  namespace: api-transferencias
  labels:
    app: api-transferencias
    component: worker-balance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-transferencias
      component: worker-balance
  template:
    metadata:
      labels:
        app: api-transferencias
        component: worker-balance
    spec:
      containers:
        - name: worker
          image: api-transferencias:latest
          command:
            - php
            - bin/console
            - messenger:consume
            - async_send_notification
            - --time-limit=3600
            - --memory-limit=128M
            - -vv
          envFrom:
            - configMapRef:
                name: api-transferencias-config
            - secretRef:
                name: api-transferencias-secret
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - ps aux | grep -v grep | grep messenger:consume
            periodSeconds: 30
            failureThreshold: 3
      restartPolicy: Always

[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 1000

pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

clear_env = no
catch_workers_output = yes
decorate_workers_output = no

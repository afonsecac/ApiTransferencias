# ===========================================
# VPS STAGING - Overrides sobre base
# Uso: docker compose -f docker-compose.vps.yaml -f docker-compose.vps.staging.yaml up -d
# ===========================================

services:
  php-fpm:
    build:
      target: app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # No publicar la BD ni el broker en el host del VPS. La app y los workers los
  # alcanzan por la red interna de Docker (service name), no hace falta bindear
  # puertos al host, que quedarían expuestos según el firewall del VPS.
  # Para acceso puntual de depuración, usar un túnel SSH en lugar de abrir el puerto.

  # ============================================
  # MAILCATCHER - Captura emails en staging
  # ============================================
  mailcatcher:
    image: schickling/mailcatcher
    labels:
      - traefik.enable=true
      - traefik.http.routers.mail.rule=Host(`mail.${DOMAIN}`)
      - traefik.http.routers.mail.entrypoints=websecure
      - traefik.http.routers.mail.tls.certresolver=letsencrypt
      - traefik.http.services.mail.loadbalancer.server.port=1080
    restart: always
    networks:
      - app

  # ============================================
  # WORKER UNICO - Consume todas las colas en staging
  # ============================================
  worker:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      target: app
    command: >
      sh -c "until nc -z rabbitmq 5672 2>/dev/null; do sleep 2; done &&
      php bin/console messenger:consume
      async_notifications_high
      async_clients_high
      async_send_sale_package
      async_check_status
      async_send_notification
      scheduler_default
      --time-limit=3600
      --memory-limit=256M
      -vv"
    environment: &staging-worker-env
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=18&charset=utf8
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      CORS_DASHBOARD_ORIGIN: ${CORS_DASHBOARD_ORIGIN}
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      MESSENGER_TRANSPORT_VHOST: ${MESSENGER_TRANSPORT_VHOST}
      MESSENGER_TRANSPORT_FAILURE: ${MESSENGER_TRANSPORT_FAILURE:-doctrine://default?queue_name=failed}
      MICROSOFT_URL: ${MICROSOFT_URL}
      JWT_MEMORY_KEY: ${JWT_MEMORY_KEY}
      JWT_PHRASE_KEY: ${JWT_PHRASE_KEY}
      JWT_TIMEOUT: ${JWT_TIMEOUT:-30}
      APP_TEST_PHONE: ${APP_TEST_PHONE}
      APP_MAILER_FROM: ${APP_MAILER_FROM}
      COMREMIT_DASHBOARD_URL: ${COMREMIT_DASHBOARD_URL}
      SENDMUNDO_DASHBOARD_URL: ${SENDMUNDO_DASHBOARD_URL}
      SYS_CONFIG_ENCRYPTION_KEY: ${SYS_CONFIG_ENCRYPTION_KEY}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - app

volumes:
  database_data:
    name: api-transferencias_database_data

# ===========================================
# BASE COMPARTIDA VPS - No usar directamente
# Usar con: -f docker-compose.vps.yaml -f docker-compose.vps.<env>.yaml
# ===========================================

services:
  # ============================================
  # REVERSE PROXY - SSL automatico con Let's Encrypt
  # ============================================
  traefik:
    image: traefik:latest
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-WARN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}
    restart: always
    networks:
      - app

  # ============================================
  # APLICACION
  # ============================================
  php-fpm:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
      target: app
    environment: &app-env
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=18&charset=utf8
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      CORS_DASHBOARD_ORIGIN: ${CORS_DASHBOARD_ORIGIN}
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f/
      MESSENGER_TRANSPORT_VHOST: ${MESSENGER_TRANSPORT_VHOST}
      MESSENGER_TRANSPORT_FAILURE: ${MESSENGER_TRANSPORT_FAILURE:-doctrine://default?queue_name=failed}
      MICROSOFT_URL: ${MICROSOFT_URL}
      JWT_MEMORY_KEY: ${JWT_MEMORY_KEY}
      JWT_PHRASE_KEY: ${JWT_PHRASE_KEY}
      JWT_TIMEOUT: ${JWT_TIMEOUT:-30}
      APP_TEST_PHONE: ${APP_TEST_PHONE}
      APP_MAILER_FROM: ${APP_MAILER_FROM}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - app

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=80
    depends_on:
      - php-fpm
    restart: always
    networks:
      - app

  # ============================================
  # BASE DE DATOS
  # ============================================
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app

  # ============================================
  # COLA DE MENSAJES
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${MESSENGER_TRANSPORT_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.${DOMAIN}`)
      - traefik.http.routers.rabbitmq.entrypoints=websecure
      - traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt
      - traefik.http.services.rabbitmq.loadbalancer.server.port=15672
    restart: always
    networks:
      - app

volumes:
  traefik_letsencrypt:
  database_data:
    external: true
    name: ${PG_DATA_VOLUME:-apitransferencias_database_data}
  rabbitmq_data:

networks:
  app:
    driver: bridge

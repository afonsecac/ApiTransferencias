name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php-versions }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        php-versions: ['8.2']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          coverage: none
          tools: composer:v2
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, dom, filter, gd, json, pdo, amqp, zip, opcache, apcu

      - name: Validate composer
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check Symfony requirements
        run: vendor/bin/requirements-checker

      - name: Check Symfony console
        run: bin/console -V
        env:
          APP_ENV: test

      - name: Run tests
        run: |
          cp .env.ci .env.test 2>/dev/null || true
          cp .env.ci .env 2>/dev/null || true
          cp phpunit.ci.xml phpunit.xml 2>/dev/null || true
          composer test
        env:
          DATABASE_URL: postgresql://app:app@localhost:5432/app_test?serverVersion=15&charset=utf8

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, amqp, zip, opcache, apcu

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  lint:
    name: Code Style
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP-CS-Fixer
        uses: docker://oskarstark/php-cs-fixer-ga
        with:
          args: --config=.php_cs.dist --diff --dry-run
        continue-on-error: true

name: Deploy Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  statuses: write

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.PROD_APP_PATH || '/opt/api-transferencias' }}

            echo "=== Creating pre-deploy backup ==="
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            mkdir -p backups/prod
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps exec -T database \
              pg_dump -U $(grep ^POSTGRES_USER .env.vps | cut -d= -f2) \
              $(grep ^POSTGRES_DB .env.vps | cut -d= -f2) \
              | gzip > "backups/prod/db_${TIMESTAMP}.sql.gz"
            echo "Backup: backups/prod/db_${TIMESTAMP}.sql.gz"

            echo "=== Pulling latest changes ==="
            git fetch origin master
            git checkout master
            git pull origin master

            echo "=== Building images ==="
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps build

            echo "=== Running migrations ==="
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps up -d database rabbitmq
            sleep 10
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps run --rm -T php-fpm php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

            echo "=== Deploying ==="
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps up -d --remove-orphans --force-recreate

            echo "=== Clearing cache ==="
            docker compose -f docker-compose.vps.yaml -f docker-compose.vps.prod.yaml \
              --env-file .env.vps exec -T php-fpm php bin/console cache:clear --env=prod

            echo "=== Cleanup ==="
            docker image prune -f
            # Retain last 30 backups
            ls -t backups/prod/db_*.sql.gz 2>/dev/null | tail -n +31 | xargs -r rm

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost/health/ready || exit 1

            echo "=== Production deploy complete ==="

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const sha = context.sha.substring(0, 7);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `${status} Production deploy ${sha}`,
              context: 'deploy/production'
            });
